version: '3.8'

services:
  backend:
    image: ghcr.io/josemaeldon/pablomisley-backend:latest
    networks:
      - cloudbrnet
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://postgres:postgres@database:5432/pablomisley
      JWT_SECRET: pablomisley_jwt_secret_change_in_production
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
    volumes:
      - uploads-data:/usr/src/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first

  frontend:
    image: ghcr.io/josemaeldon/pablomisley-frontend:latest
    networks:
      - cloudbrnet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.frontend.rule=Host(`pablomisley.cloudbr.app`)"
        - "traefik.http.routers.frontend.entrypoints=websecure"
        - "traefik.http.routers.frontend.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.frontend.loadbalancer.server.port=80"

  database:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pablomisley
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - cloudbrnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pablomisley"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      placement:
        constraints:
          - node.role == manager

networks:
  cloudbrnet:
    external: true

volumes:
  db-data:
    driver: local
  uploads-data:
    driver: local